  <p id="pricingSubtitle" class="text-lg text-gray-500 text-center mb-4"></p>

    <div class="inline-flex bg-white border border-gray-200 rounded-2xl p-1 gap-1 shadow-sm">

// ─── Groups config ────────────────────────────────────────────────────────────
const groups = [
  { id: "group1", labelKey: "group1", basicPrice: 149, proPrice: 249,  icseBasic: null,  isePro: null  },
  { id: "group2", labelKey: "group2", basicPrice: 199, proPrice: 349,  icseBasic: null,  icsePro: null },
  { id: "group3", labelKey: "group3", basicPrice: 249, proPrice: 449,  icseBasic: null,  icsePro: null },
  { id: "group4", labelKey: "group4", basicPrice: 299, proPrice: 549,  icseBasic: 349,   icsePro: 649  },
];

// ─── Billing config ───────────────────────────────────────────────────────────
const billing = {
  monthly:   { months: 1,  discount: 0    },
  quarterly: { months: 3,  discount: 0.10 },
  yearly:    { months: 12, discount: 0.25 },
};

// ─── State ────────────────────────────────────────────────────────────────────
let currentLang    = 'en';
let currentBilling = 'monthly';

// ─── Price calculator ─────────────────────────────────────────────────────────
function calcPrice(base, period) {
  const { months, discount } = billing[period];
  return Math.round(base * months * (1 - discount));
}

// ─── Billing toggle ───────────────────────────────────────────────────────────
function setBilling(period) {
  currentBilling = period;
  updateBillingButtons();
  renderCards(currentLang);
}

function updateBillingButtons() {
  const t = translations[currentLang];
  ['monthly','quarterly','yearly'].forEach(p => {
    const btn = document.getElementById('btn-' + p);
    btn.textContent = t['billing' + p.charAt(0).toUpperCase() + p.slice(1)];
    if (p === currentBilling) {
      btn.className = 'billing-btn px-5 py-2 rounded-xl text-sm font-bold bg-gray-900 text-white shadow transition-all';
    } else {
      btn.className = 'billing-btn px-5 py-2 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700 transition-all';
    }
    // Add savings badge
    if (billing[p].discount > 0 && p !== 'monthly') {
      const pct = Math.round(billing[p].discount * 100);
      if (p === currentBilling) {
        btn.innerHTML = t['billing' + p.charAt(0).toUpperCase() + p.slice(1)] +
          ` <span class="ml-1 text-xs bg-green-400 text-green-900 px-1.5 py-0.5 rounded-full">${t.saveLabel.replace('{pct}', pct)}</span>`;
      } else {
        btn.innerHTML = t['billing' + p.charAt(0).toUpperCase() + p.slice(1)] +
          ` <span class="ml-1 text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full">${t.saveLabel.replace('{pct}', pct)}</span>`;
      }
    }
  });
}

// ─── Render cards ─────────────────────────────────────────────────────────────
function renderCards(lang) {
  const t = translations[lang];
  const isRTL = (lang === 'ur');
  const container = document.getElementById('pricingCards');
  container.innerHTML = '';

  groups.forEach((group, idx) => {
    const basicTotal = calcPrice(group.basicPrice, currentBilling);
    const proTotal   = calcPrice(group.proPrice,   currentBilling);
    const perMonthBasic = currentBilling === 'monthly' ? group.basicPrice : Math.round(basicTotal / billing[currentBilling].months);
    const perMonthPro   = currentBilling === 'monthly' ? group.proPrice   : Math.round(proTotal   / billing[currentBilling].months);

    const showICSE  = (group.icseBasic !== null);
    const icseNote  = showICSE
      ? `<p class="text-xs text-gray-400 mt-2">${t.icseNote.replace('{basic}', group.icseBasic).replace('{pro}', group.icsePro)}</p>`
      : '';

    const billingLabel = currentBilling !== 'monthly'
      ? `<span class="text-xs font-semibold text-green-600 ml-1">(₹${perMonthPro}${t.perMonth})</span>`
      : '';

    const isHighlighted = idx === 2; // Group 3 (Class 6-8) highlighted by default

    const card = `
      <div class="card-hover bg-white rounded-3xl border-2 ${isHighlighted ? 'border-green-500 shadow-2xl' : 'border-gray-100 shadow-lg'} overflow-hidden flex flex-col" dir="${isRTL ? 'rtl' : 'ltr'}">

        ${isHighlighted ? `<div class="bg-green-500 text-white text-center text-xs font-black py-2 tracking-wider uppercase">✨ ${t.mostPopular}</div>` : '<div class="py-5"></div>'}

        <div class="px-7 pb-8 flex flex-col flex-1">
          <!-- Class label -->
          <div class="text-center mb-6">
            <span class="inline-block bg-gradient-to-r from-green-100 to-blue-100 text-gray-700 px-5 py-1.5 rounded-full text-sm font-bold">
              ${t[group.labelKey]}
            </span>
          </div>

          <!-- Basic plan -->
          <div class="mb-4 p-4 rounded-2xl bg-gray-50 border border-gray-200">
            <div class="flex justify-between items-center mb-1">
              <span class="font-bold text-gray-700 text-base">${t.basicPlan}</span>
              <span class="text-xs text-gray-400 font-medium">${t.billingMonthly !== t['billing' + currentBilling.charAt(0).toUpperCase() + currentBilling.slice(1)] ? `₹${basicTotal} total` : ''}</span>
            </div>
            <div class="flex items-baseline gap-1">
              <span class="text-4xl font-black text-gray-800">₹${perMonthBasic}</span>
              <span class="text-gray-400 text-sm font-medium">${t.perMonth}</span>
            </div>
          </div>

          <!-- Pro plan (highlighted) -->
          <div class="mb-5 p-5 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 text-white relative shadow-lg">
            <div class="flex justify-between items-center mb-1">
              <span class="font-black text-lg">${t.proPlan}</span>
              <span class="text-xs text-green-200 font-medium">${currentBilling !== 'monthly' ? `₹${proTotal} total` : ''}</span>
            </div>
            <div class="flex items-baseline gap-1">
              <span class="text-5xl font-black">₹${perMonthPro}</span>
              <span class="text-green-200 text-sm font-medium">${t.perMonth}</span>
            </div>
            ${currentBilling !== 'monthly' ? `
            <div class="mt-2 text-xs text-green-100 font-semibold">
              ${t.saveLabel.replace('{pct}', Math.round(billing[currentBilling].discount * 100))} vs monthly
            </div>` : ''}
          </div>

          ${icseNote}

          <!-- Features -->
          <div class="space-y-3 mb-6 flex-1">
            <div class="flex items-start gap-2.5 text-sm text-gray-600">
              <span class="text-green-500 mt-0.5 shrink-0 font-bold">✓</span>
              <span>${t.featuresBasic}</span>
            </div>
            <div class="flex items-start gap-2.5 text-sm text-gray-600">
              <span class="text-green-500 mt-0.5 shrink-0 font-bold">✓</span>
              <span>${t.featuresPro}</span>
            </div>
          </div>

          <!-- Buttons -->
          <div class="space-y-2.5 mt-auto">
            <button onclick="selectPlan('${group.id}', 'basic', ${perMonthBasic})"
              class="w-full py-3.5 rounded-2xl font-bold text-sm bg-gray-100 hover:bg-gray-200 text-gray-800 transition-all">
              ${t.choosePlanBtn} — ${t.basicPlan}
            </button>
            <button onclick="selectPlan('${group.id}', 'pro', ${perMonthPro})"
              class="w-full py-3.5 rounded-2xl font-black text-sm bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white transition-all shadow-md">
              ${t.choosePlanBtn} — ${t.proPlan}
            </button>
          </div>
        </div>
      </div>
    `;
    container.innerHTML += card;
  });
}

// ─── Language change ──────────────────────────────────────────────────────────
document.getElementById('languageSelector').addEventListener('change', function() {
  currentLang = this.value;
  const t = translations[currentLang];
  const isRTL = (currentLang === 'ur');

  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
  document.getElementById('pricingTitle').textContent    = t.pricingTitle;
  document.getElementById('pricingSubtitle').textContent = t.pricingSubtitle;
  document.getElementById('trialBadge').textContent      = t.trialBadge;
  document.getElementById('footerNote').textContent      = t.footerNote;

  updateBillingButtons();
  renderCards(currentLang);
});

  // TODO: Replace with actual Razorpay integration

// ─── Initial render ───────────────────────────────────────────────────────────
(function init() {
  const t = translations[currentLang];
  document.getElementById('pricingTitle').textContent    = t.pricingTitle;
  document.getElementById('pricingSubtitle').textContent = t.pricingSubtitle;
  document.getElementById('trialBadge').textContent      = t.trialBadge;

  updateBillingButtons();
